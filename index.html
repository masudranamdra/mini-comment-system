<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            max-width: 1600px;
            font-family: sans-serif;
            padding-left: 20px;
            padding-right: 20px;
            padding-top: 0.1px;
            background-color: rgb(214, 241, 245);
        }

        .comment {
            border: 3px solid rgb(137, 184, 154);
            padding: 5px 10px 5px 10px;
            background-color: rgb(255, 255, 255);
            border-radius: 5px;
            color: rgb(107, 141, 141);
            box-shadow: 1px 1px 3px 0px;
        }

        body h1 {
            color: rgb(71, 85, 95);
            text-align: center;
        }

        .div textarea {
            border: 0.5px solid rgb(160, 192, 218);
            background-color: rgb(255, 255, 255);
            border-radius: 4px;
            color: rgb(61, 154, 236);
            text-align: start;
            padding-top: 15px;
        }

        .div template:hover {
            border: 0.5px solid rgb(160, 192, 218);
        }

        .div button {
            border: none;
            background-color: rgb(94, 185, 245);
            padding: 5px 15px 5px 15px;
            border-radius: 4px;
            color: rgb(255, 255, 255);
            cursor: pointer;
            transition: all 0.2s ease-in;
        }

        .div button:hover {
            background-color: rgb(164, 210, 252);
            color: rgb(76, 93, 106);
        }
    </style>
</head>

<body>
    <h1 id="hadeing">Comment Project</h1>

    <div id="commentbox">

        <p id="commentseen" class="comment">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Veritatis voluptatibus ab omnis molestias, ducimus
            possimus animi, reprehenderit libero doloremque ea veniam eum ipsa beatae at natus debitis. Porro, ipsam
            nisi?
        </p>
    </div>

    <div id="commentdiv" class="div">
        <textarea name="" id="commenttype" cols="30" placeholder="Type your comment" rows="5"></textarea>
        <hr>
        <button id="commentsendbutton">Send</button>
    </div>
    <script>
        const commentProject = document.getElementById('commentsendbutton').addEventListener('click',
            function(){
                const commentInputFild = document.getElementById('commenttype');

                const Inputcomment = commentInputFild.value;
                
                const makeElement = document.createElement('p')
                makeElement.innerText = Inputcomment
                
            const inputfild = document.getElementById('commentbox')

            const addcss = makeElement.classList.add('comment')
            const aupt = inputfild.appendChild(makeElement);
                console.log(aupt)

            commentInputFild.value = ''
            }
        )
        
    </script>
</body>

</html>
